# Stations
###########################
**.numStations = 3
include stations/WorldWide-20.ini


#####################
# Visualizer
#####################
# Disable medium visualizer completely
*.visualizer.canvasVisualizer.mediumVisualizer.typename = ""

*.visualizer.*.radioVisualizer.displayAntennaLobes = true
*.visualizer.*.dataLinkVisualizer.displayLinks = true
*.visualizer.*.mobilityVisualizer.displayMovementTrails = true
*.visualizer.*.mobilityVisualizer.movementTrailLineWidth = 1
*.visualizer.*.mobilityVisualizer.trailLength = 3000


####################
# Mac parameters
**.ttxStart_max = 30s
**.ttxIdle_min = 10s                            # Minimum idle time between transmissions
**.ttxIdle_max = 25s                           	# Maximum idle time between transmissions
**.Ntw = 2										# Number of transmission windows
**.Ntx = 45										# Number of transmission windows
**.ttwDuration = 550s                           # Duration of the transmission window

# ttwDuration = approx (sim_duration / Ntw) = approx(1200/4) = approx(300)



