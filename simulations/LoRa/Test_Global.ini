[General]

network = Florasat.Florasat

*.visualizer.osgVisualizer.typename = ""
*.radioMedium.mediumLimitCache.maxTransmissionDuration = 20s

rng-class = "cMersenneTwister"
*.**.result-recording-modes = -       # --> none
**.result-recording-modes = -         # --> none
**.statistic-recording = true #false
**.scalar-recording = true #false
**.vector-recording = true #false
**.vector-record-eventnumbers = true #false


repeat = 2
seed-0-mt = ${23542, 84242 ! repetition}
sim-time-limit = 5999s
simtime-resolution = -11


#####################
# Constellation
#####################
include constellations/Iridium.ini

*.satellite[*].noradModuleType = "Sat_Mob_NoradA"

**.satellite[*].**.initFromDisplayString = false
*.satellite[*].mobility.faceForward = false
*.satellite[*].mobility.updateInterval = 999999s # disable self-message update mechanism

*.satellite[*].NoradModule.satName  = "FLoRaSat"
*.satellite[*].NoradModule.satIndex = -1
*.satellite[*].NoradModule.baseYear = 20
*.satellite[*].NoradModule.baseDay  = 1.5

# Set typename of antenna
*.satellite[*].phyDSL.radio.antenna.typename = "ConstantGainAntenna"

# Set antenna mobility modules for satellite radios
*.satellite[*].phyDSL.radio.antenna.mobilityModule = "^.^.^.mobility"
*.satellite[*].phyISL.radio.antenna.mobilityModule = "^.^.^.mobility"
*.satellite[*].phyGSL.radio.antenna.mobilityModule = "^.^.^.mobility"

# Set antenna gain for radio 
*.satellite[*].phyDSL.radio.antenna.gain = 12dB



##antenna.typename = default("");

*.**.numGroundLinks 					  = 60
*.topologyControl.updateInterval 		  = 10000ms
*.topologyControl.timeSliceLength 		  = 5000ms
##*.loRaGW[*].packetHandler.processingDelay = 100ms # random processing delay added to each hop, switching etc.
##*.loRaGW[*].packetHandler.ackDelay 		  = 100ms
##*.loRaGW[*].queue.packetCapacity 		  = 40

*.satellite[*].**.interfaceTableModule = ""

# Routing Type
*.satellite[*].net.routingType = "Sat_Net_DDRARouting" #"Base_Routing"
*.terminal[*].net.routingType = "Ter_Net_DDRARouting"

# LoRa PHY Configuration
**.radioMedium.typename = "LoRaMedium"
**.radioMedium.analogModel.typename = "LoRaAnalogModel"

# Custom PHY Configuration
# **.radioMedium.typename = "CustomMedium"
# **.radioMedium.analogModel.typename = "CustomPHYAnalogModel"
# **.radioMedium.backgroundNoise.power = 0dBm
# **.radioMedium.analogModel.pathLossExponent = 2.0
# **.radioMedium.analogModel.obstructionLossdB = 0dB
# **.radioMedium.minimumElevationTermSat = 5.0

# Disable ISLs
**.intraPlaneIslDisabled = false
**.interPlaneIslDisabled = false

###########################
# LoRa Nodes (devices on ground)
###########################
**.numTerminals = 30
*.terminal[*].phy.radio.antenna.mobilityModule = "^.^.^.mob"
*.terminal[*].phy.radio = "Ter_Phy_LoRaRadio"
*.terminal[*].dlk.mac.interfaceTableModule = ""
*.terminal[*].dlk.energySourceModule = ""

#*.terminal[*].dlk.radio = "^.^.phy.radio"
##*.terminal[*].dlk.mac.radioModule = "^.^.phy.radio"

# Application
**.numberOfPacketsToSend = 0  	#${numberOfPAckets = 200..5000 step 200}  # 0 means infinite number of packets
**.timeToFirstPacket 	 = 1s   #time to first packet can be set at any moment
**.timeToNextPacket 	 = 50s	#time to next packet must follow the 1% duty cycle, you can find the limit time on SimpleLoRaApp

include devices/WorldWide-30.ini
#*.terminal[*].mob.deploymentRadius 	= 10000.0
#*.terminal[*].mob.centerLatitude 	= 0.1	// never 0.0
#*.terminal[*].mob.centerLongitude 	= 0.1	// never 0.0

###########################
# Stations
###########################
**.numStations = 20
include stations/WorldWide-20.ini


#####################
# Visualizer
#####################
# Disable medium visualizer completely
*.visualizer.canvasVisualizer.mediumVisualizer.typename = ""

*.visualizer.*.radioVisualizer.displayAntennaLobes = true
*.visualizer.*.dataLinkVisualizer.displayLinks = true
*.visualizer.*.mobilityVisualizer.displayMovementTrails = true
*.visualizer.*.mobilityVisualizer.movementTrailLineWidth = 1
*.visualizer.*.mobilityVisualizer.trailLength = 3000


#####################
# Routing
####################
*.topologyControl.timeSliceLength 	= 5000ms

